<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OH! Barcode</title>
    <style>
      :root{
        --ozkiz-orange:#e11d2e;
        --ozkiz-orange-dark:#b0121f;
        --ozkiz-pink:#c81e3a;
        --ozkiz-pink-soft:#fdeceb;
        --ozkiz-bg:#ffffff;
        --ozkiz-card:#ffffff;
        --ozkiz-line:#e5e5e5;
        --ozkiz-text:#111111;
        --ozkiz-muted:#6b7280;
      }
      * { box-sizing:border-box; }
      body { margin:0; font-family:'Segoe UI','Apple SD Gothic Neo',sans-serif; background:var(--ozkiz-bg); color:var(--ozkiz-text); }
      .wrap { max-width:1100px; margin:0 auto; padding:24px; }
      .card { background:var(--ozkiz-card); border:1px solid var(--ozkiz-line); border-radius:20px; padding:20px; margin-bottom:16px; box-shadow:0 6px 20px rgba(0,0,0,0.06); }
      .brand{display:flex; align-items:center; gap:12px; flex-wrap:wrap;}
      .brand-text{flex:1; min-width:180px;}
      .brand-text h1{ font-size:22px; font-weight:800; margin:0; color:#111; letter-spacing:-0.5px; }
      .brand-text h1 .brand-mark{ color:var(--ozkiz-orange); font-weight:800; font-size:1em; }
      .brand-text span{ font-size:13px; color:var(--ozkiz-muted); }
      .view-toggle{display:flex; gap:6px; flex-shrink:0;}
      .view-btn{width:auto; padding:9px 16px; font-size:13px; border-radius:999px; background:#fff; color:var(--ozkiz-orange); border:1.5px solid var(--ozkiz-orange);}
      .view-btn:hover{background:var(--ozkiz-pink-soft);}
      .view-btn.active{background:var(--ozkiz-orange); color:#fff; border-color:var(--ozkiz-orange);}
      .view-btn.active:hover{background:var(--ozkiz-orange-dark); border-color:var(--ozkiz-orange-dark);}
      h1,h2{margin-top:0; color:var(--ozkiz-text);}
      h2{font-size:18px; color:var(--ozkiz-text);}
      .grid{display:grid; gap:16px; grid-template-columns:1fr 1fr;}
      label{display:block; margin-bottom:8px; font-weight:600; color:var(--ozkiz-text);}
      input, textarea, select, button{width:100%; padding:12px; border-radius:12px; border:1px solid var(--ozkiz-line); font-size:15px; font-family:inherit;}
      input, select{background:#fff; color:var(--ozkiz-text);}
      input[type="checkbox"]{width:16px; height:16px; padding:0; flex:0 0 16px; accent-color:var(--ozkiz-orange); cursor:pointer;}
      button{cursor:pointer; background:var(--ozkiz-orange); color:white; font-weight:700; border:none; transition:transform .05s ease, background .15s ease;}
      button:hover{background:var(--ozkiz-orange-dark);}
      button:active{transform:scale(0.98);}
      button.secondary{background:var(--ozkiz-pink); color:#fff;}
      button.secondary:hover{background:var(--ozkiz-orange-dark);}
      button.ghost{background:var(--ozkiz-pink); color:#fff;}
      button.ghost:hover{background:var(--ozkiz-orange-dark);}
      .job, .product {border:1px solid var(--ozkiz-line); border-radius:14px; padding:12px; background:#fafafa; margin-bottom:8px;}
      .row{display:flex; justify-content:space-between; gap:8px; align-items:center;}
      #productResults{max-height:520px; overflow-y:auto; padding-right:4px;}
      .product{margin-bottom:10px;}
      .product-actions{display:flex; gap:8px; margin-top:8px;}
      .product-actions .print-btn{flex:1;}
      .product-actions .add-btn{flex:0 0 44px; padding:12px 0; font-size:16px; font-weight:800;}
      .small{font-size:13px; color:var(--ozkiz-muted);}
      .job-top{display:flex; align-items:center; gap:8px;}
      .job-top strong{font-size:15px; font-weight:700; letter-spacing:-0.2px;}
      .job-status{margin-left:auto; flex:0 0 auto; width:auto; padding:3px 10px; font-size:11px; font-weight:700; border-radius:999px; background:var(--ozkiz-pink-soft); color:var(--ozkiz-orange-dark);}
      .job-note{margin-top:4px;}
      .qty-row{display:flex; align-items:center; gap:8px; margin-top:10px;}
      .qty-btn{width:32px; height:32px; flex:0 0 32px; padding:0; border-radius:10px; font-size:17px; font-weight:800; line-height:1; background:var(--ozkiz-orange); color:#fff;}
      .qty-btn:hover{background:var(--ozkiz-orange-dark);}
      .qty-input{width:48px; flex:0 0 48px; padding:6px 4px; text-align:center; font-weight:700;}
      .qty-time{margin-left:auto; flex:0 0 auto;}
      .job-actions{display:flex; gap:8px; margin-top:10px;}
      .job-actions button{width:auto; padding:6px 12px; font-size:12px;}
      .queue-toolbar{display:flex; gap:6px; margin-bottom:8px;}
      .queue-toolbar button{width:auto; flex:1; padding:7px 4px; font-size:12px; white-space:nowrap;}
      .log-actions{display:flex; justify-content:flex-end; margin-top:8px;}
      .log-actions button{width:auto; padding:7px 14px; font-size:13px;}
      .log-toolbar{display:flex; gap:8px; flex-shrink:0;}
      .log-toolbar button{width:auto; padding:7px 14px; font-size:13px;}
      @media (max-width:800px){.grid{grid-template-columns:1fr;}}

      body.force-pc .grid{grid-template-columns:1fr 1fr !important;}
      body.force-mobile .grid{grid-template-columns:1fr !important;}
      body.force-mobile .wrap{padding:14px;}
      body.force-mobile .card{padding:16px; border-radius:16px;}
      body.force-mobile input, body.force-mobile select, body.force-mobile button{font-size:16px; padding:14px;}
      body.force-mobile h2{font-size:17px;}
      body.force-mobile .product-actions .add-btn{flex:0 0 52px; font-size:18px;}
      body.force-mobile .small{font-size:13px;}
      .scan-card{display:none;}
      body.force-mobile .scan-card{display:block;}
      #scanVideo{width:100%; border-radius:12px; background:#000; display:block;}
      .scan-actions{display:flex; gap:8px; margin-top:10px;}
      .scan-actions button{width:auto; flex:1;}
    </style>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.21.3/umd/index.min.js"></script>
  </head>
  <body>
    <div class="wrap">
      <div class="card brand">
        <div class="brand-text">
          <h1><span class="brand-mark">OH!</span> Barcode</h1>
          <span>상품명을 입력하면 Supabase의 상품 데이터에서 바코드를 찾아 바로 스티커 출력 요청을 보냅니다.</span>
        </div>
        <div class="view-toggle">
          <button type="button" id="viewPcButton" class="view-btn">PC 버전</button>
          <button type="button" id="viewMobileButton" class="view-btn">모바일 버전</button>
        </div>
      </div>

      <div class="card scan-card">
        <h2>바코드 스캔</h2>
        <button id="startScanButton" type="button">카메라로 바코드 스캔</button>
        <div id="scanVideoWrap" style="display:none; margin-top:10px;">
          <video id="scanVideo" playsinline autoplay muted></video>
          <div class="scan-actions">
            <button id="stopScanButton" class="ghost" type="button">스캔 중지</button>
          </div>
        </div>
        <p id="scanMessage" class="small"></p>
      </div>

      <div class="grid">
        <div class="card">
          <h2>바코드 스티커 출력</h2>
          <label>검색어</label>
          <input id="productQuery" placeholder="상품명 또는 상품명 색상 사이즈" />
          <div class="row" style="margin-top:10px;">
            <button id="searchButton" type="button">검색</button>
          </div>
          <p id="searchMessage" class="small"></p>
          <div id="productResults"></div>
        </div>

        <div class="card">
          <h2>출력 대기열</h2>
          <div class="queue-toolbar">
            <button id="selectAllButton" class="secondary" type="button">전체 선택</button>
            <button id="printSelectedButton" class="secondary" type="button">선택 출력</button>
            <button id="printAllButton" class="secondary" type="button">전체 출력</button>
          </div>
          <div class="queue-toolbar">
            <button id="deleteSelectedButton" class="ghost" type="button">선택 삭제</button>
            <button id="deleteAllButton" class="ghost" type="button">전체 삭제</button>
          </div>
          <div id="jobList"></div>
        </div>
      </div>
      <div class="card">
        <div class="row">
          <h2>출력 로그</h2>
          <div class="log-toolbar">
            <button id="toggleLogsButton" class="ghost" type="button">접기</button>
            <button id="clearLogsButton" class="ghost" type="button">초기화</button>
          </div>
        </div>
        <div id="logList"></div>
      </div>
    </div>

    <script>
      const searchInput = document.getElementById('productQuery');
      const searchButton = document.getElementById('searchButton');
      const searchMessage = document.getElementById('searchMessage');
      const productResults = document.getElementById('productResults');
      const jobList = document.getElementById('jobList');
      const logList = document.getElementById('logList');
      const selectAllButton = document.getElementById('selectAllButton');
      const printSelectedButton = document.getElementById('printSelectedButton');
      const printAllButton = document.getElementById('printAllButton');
      const deleteSelectedButton = document.getElementById('deleteSelectedButton');
      const deleteAllButton = document.getElementById('deleteAllButton');
      const startScanButton = document.getElementById('startScanButton');
      const stopScanButton = document.getElementById('stopScanButton');
      const scanVideoWrap = document.getElementById('scanVideoWrap');
      const scanVideo = document.getElementById('scanVideo');
      const scanMessage = document.getElementById('scanMessage');
      let barcodeReader = null;
      const viewPcButton = document.getElementById('viewPcButton');
      const viewMobileButton = document.getElementById('viewMobileButton');
      const toggleLogsButton = document.getElementById('toggleLogsButton');
      const clearLogsButton = document.getElementById('clearLogsButton');
      const state = { jobs: [], products: [], logs: [], searched: false, selectedJobs: new Set(), logsCollapsed: false };

      function applyViewMode(mode) {
        const isMobile = mode === 'mobile';
        document.body.classList.toggle('force-mobile', isMobile);
        document.body.classList.toggle('force-pc', !isMobile);
        viewPcButton.classList.toggle('active', !isMobile);
        viewMobileButton.classList.toggle('active', isMobile);
        localStorage.setItem('viewMode', mode);
        if (!isMobile) stopScan();
      }

      viewPcButton.addEventListener('click', () => applyViewMode('pc'));
      viewMobileButton.addEventListener('click', () => applyViewMode('mobile'));

      async function refreshJobs() {
        const response = await fetch('/api/jobs');
        state.jobs = await response.json();
        renderJobs();
      }

      async function refreshLogs() {
        const response = await fetch('/api/logs');
        state.logs = await response.json();
        renderLogs();
      }

      function renderLogs() {
        if (!state.logs.length) {
          logList.innerHTML = '<div class="job"><div class="small">출력 로그가 없습니다.</div></div>';
          return;
        }

        logList.innerHTML = state.logs.map((log) => `
          <div class="job">
            <div class="row"><strong>${log.barcode}</strong><span>${new Date(log.printedAt).toLocaleString()}</span></div>
            <div class="small">품번: ${log.sku || '-'} / 옵션: ${log.option || '-'}</div>
            ${log.note ? `<div class="small">상품명: ${log.note}</div>` : ''}
            <div class="log-actions">
              <button type="button" class="ghost" onclick="reprintLog('${log.id}')">재출력</button>
            </div>
          </div>
        `).join('');
      }

      window.reprintLog = function(logId) {
        const log = state.logs.find((item) => item.id === logId);
        if (!log) return;
        const job = { barcode: log.barcode, quantity: 1, note: log.note, sku: log.sku, option: log.option };
        const printWindow = window.open('', '_blank', 'width=960,height=680');
        printWindow.document.write(buildLabelHtml(job));
        printWindow.document.close();
        setTimeout(() => { printWindow.print(); }, 400);
      };

      function statusLabel(status) {
        if (status === 'printing') return '출력중';
        if (status === 'pending') return '대기중';
        return status;
      }

      function renderJobs() {
        if (!state.jobs.length) {
          jobList.innerHTML = '<div class="job"><div class="small">대기 중인 요청이 없습니다.</div></div>';
          state.selectedJobs.clear();
          return;
        }

        jobList.innerHTML = state.jobs.map((job) => {
          const isSelected = state.selectedJobs.has(job.id);
          return `
          <div class="job" style="border-color:${isSelected ? '#e11d2e' : '#e5e5e5'};">
            <div class="job-top">
              <input type="checkbox" data-job-id="${job.id}" ${isSelected ? 'checked' : ''} />
              <strong>${job.barcode}</strong>
              <span class="job-status">${statusLabel(job.status)}</span>
            </div>
            ${job.note ? `<div class="small job-note">${job.note}</div>` : ''}
            ${job.option ? `<div class="small">옵션: ${job.option}</div>` : ''}
            <div class="qty-row">
              <button type="button" class="qty-btn" data-action="dec" data-job-id="${job.id}">−</button>
              <input type="number" class="qty-input" data-job-id="${job.id}" value="${job.quantity}" min="1" inputmode="numeric" />
              <button type="button" class="qty-btn" data-action="inc" data-job-id="${job.id}">+</button>
              <span class="small qty-time">${new Date(job.createdAt).toLocaleString()}</span>
            </div>
            <div class="job-actions">
              <button type="button" onclick="printJob('${job.id}')">출력</button>
              <button type="button" class="ghost" onclick="deleteJob('${job.id}')">삭제</button>
            </div>
          </div>
        `;
        }).join('');
      }

      function updateJobQuantity(jobId, quantity) {
        const safeQuantity = Math.max(1, Math.floor(Number(quantity)) || 1);
        const job = state.jobs.find((item) => item.id === jobId);
        if (job) job.quantity = safeQuantity;
        renderJobs();
        fetch(`/api/jobs/${jobId}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'setQuantity', quantity: safeQuantity })
        });
      }

      function renderProducts() {
        if (!state.searched) {
          productResults.innerHTML = '<div class="product"><div class="small">상품명을 입력한 뒤 검색 버튼을 눌러주세요.</div></div>';
          return;
        }

        if (!state.products.length) {
          productResults.innerHTML = '<div class="product"><div class="small">검색 결과가 없습니다. 다른 키워드를 시도해 보세요.</div></div>';
          return;
        }

        productResults.innerHTML = state.products.map((product, index) => `
          <div class="product">
            <div class="row"><strong>${product.name}</strong><span class="small">${product.barcode || '바코드 없음'}</span></div>
            <div class="small">SKU: ${product.sku || '-'}</div>
            <div class="small">옵션: ${product.option || '-'}</div>
            <div class="product-actions">
              <button class="print-btn" type="button" data-action="print" data-index="${index}" ${product.barcode ? '' : 'disabled'}>출력</button>
              <button class="ghost add-btn" type="button" data-action="add" data-index="${index}" ${product.barcode ? '' : 'disabled'} title="대기열에 추가">+</button>
            </div>
          </div>
        `).join('');
      }

      async function searchProducts() {
        const query = searchInput.value.trim();
        state.searched = true;

        if (!query) {
          state.products = [];
          searchMessage.textContent = '검색어를 입력해주세요.';
          renderProducts();
          return;
        }

        const response = await fetch(`/api/products?query=${encodeURIComponent(query)}`);
        const data = await response.json();
        state.products = data.products || [];
        searchMessage.textContent = data.source === 'supabase'
          ? `${state.products.length}개 찾음`
          : data.source === 'sample'
            ? `샘플 데이터에서 ${state.products.length}개 찾음`
            : '검색 결과가 없습니다.';
        renderProducts();
      }

      async function addProductToQueue(product) {
        if (!product?.barcode) {
          searchMessage.textContent = '이 상품에는 바코드가 없어 대기열에 추가할 수 없습니다.';
          return;
        }

        const payload = {
          barcode: product.barcode,
          quantity: 1,
          note: product.name,
          sku: product.sku || '',
          option: product.option || '',
          source: /Android|iPhone|iPad|Mobile/i.test(navigator.userAgent) ? 'mobile' : 'desktop'
        };

        const response = await fetch('/api/jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const job = await response.json();
        const existingIndex = state.jobs.findIndex((item) => item.id === job.id);
        if (existingIndex !== -1) {
          state.jobs[existingIndex] = job;
        } else {
          state.jobs.unshift(job);
        }
        searchMessage.textContent = `${product.name}이 대기열에 추가되었습니다.`;
        renderJobs();
      }

      async function handleScannedBarcode(barcode) {
        scanMessage.textContent = `스캔됨: ${barcode} — 상품 조회 중...`;
        try {
          const response = await fetch(`/api/products?barcode=${encodeURIComponent(barcode)}`);
          const data = await response.json();
          const product = (data.products || [])[0];
          if (!product) {
            scanMessage.textContent = `일치하는 상품을 찾지 못했습니다: ${barcode}`;
            return;
          }
          await addProductToQueue(product);
          scanMessage.textContent = `${product.name} (${product.option || '-'}) 대기열에 추가됨. 계속 스캔하세요.`;
        } catch (error) {
          scanMessage.textContent = '상품 조회 중 오류가 발생했습니다.';
        }
      }

      let scanBusy = false;

      async function startScan() {
        if (barcodeReader) return;
        scanMessage.textContent = '카메라를 켜는 중...';
        scanVideoWrap.style.display = '';
        startScanButton.style.display = 'none';

        try {
          const hints = new Map();
          hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
            ZXing.BarcodeFormat.CODE_128,
            ZXing.BarcodeFormat.CODE_39,
            ZXing.BarcodeFormat.EAN_13,
            ZXing.BarcodeFormat.EAN_8,
            ZXing.BarcodeFormat.UPC_A
          ]);
          hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
          barcodeReader = new ZXing.BrowserMultiFormatReader(hints, 150);

          let attempts = 0;
          await barcodeReader.decodeFromConstraints(
            {
              video: {
                facingMode: { ideal: 'environment' },
                width: { ideal: 1920 },
                height: { ideal: 1080 }
              }
            },
            scanVideo,
            async (result) => {
              attempts += 1;
              if (!scanBusy) {
                scanMessage.textContent = `바코드를 카메라에 비춰주세요. (스캔 시도 ${attempts}회)`;
              }
              if (!result || scanBusy) return;
              scanBusy = true;
              await handleScannedBarcode(result.getText());
              setTimeout(() => { scanBusy = false; }, 1500);
            }
          );
          scanMessage.textContent = '바코드를 카메라에 비춰주세요.';
        } catch (error) {
          scanMessage.textContent = '카메라를 사용할 수 없습니다: ' + error.message;
          stopScan();
        }
      }

      function stopScan() {
        if (barcodeReader) {
          barcodeReader.reset();
          barcodeReader = null;
        }
        scanVideoWrap.style.display = 'none';
        startScanButton.style.display = '';
      }

      async function printProductNow(product) {
        if (!product?.barcode) {
          searchMessage.textContent = '이 상품에는 바코드가 없어 출력할 수 없습니다.';
          return;
        }

        const payload = {
          barcode: product.barcode,
          quantity: 1,
          note: product.name,
          sku: product.sku || '',
          option: product.option || '',
          source: /Android|iPhone|iPad|Mobile/i.test(navigator.userAgent) ? 'mobile' : 'desktop'
        };

        const response = await fetch('/api/jobs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });
        const job = await response.json();
        await printJobModel(job, product);
        searchMessage.textContent = `${product.name} 바코드를 출력했습니다.`;
      }

      const LABEL_WIDTH_MM = 80;
      const LABEL_HEIGHT_MM = 40;

      function generateBarcodeSvg(code) {
        const wrapper = document.createElement('div');
        wrapper.innerHTML = '<svg></svg>';
        const svg = wrapper.firstElementChild;
        JsBarcode(svg, String(code || '').trim(), {
          format: 'CODE128',
          displayValue: true,
          fontSize: 14,
          width: 2,
          height: 50,
          margin: 4,
          textMargin: 4
        });
        return wrapper.innerHTML;
      }

      function buildLabelBodyHtml(job, product) {
        const name = product?.name || job.note || job.barcode || '상품명 없음';
        const sku = product?.sku || job.sku || job.barcode || '';
        const option = product?.option || job.option || '-';
        const barcodeSvg = generateBarcodeSvg(job.barcode);
        return `
          <div class="label">
            <div class="field"><span class="field-label">제품명 :</span><span class="field-value">${name}</span></div>
            <div class="field"><span class="field-label">품 번 :</span><span class="field-value">${sku}</span></div>
            <div class="field"><span class="field-label">옵 션 :</span><span class="field-value">${option}</span></div>
            <div class="barcode-wrap">${barcodeSvg}</div>
          </div>
        `;
      }

      function buildLabelDocument(bodyHtml) {
        return `<!doctype html><html><head><meta charset="utf-8" /><title>Barcode Print</title><style>
          @page { size: ${LABEL_WIDTH_MM}mm ${LABEL_HEIGHT_MM}mm; margin: 0; }
          * { box-sizing: border-box; }
          html, body { margin:0; padding:0; font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif; color:#111; background:#fff; }
          .label { width:${LABEL_WIDTH_MM}mm; height:${LABEL_HEIGHT_MM}mm; padding:2mm 3mm; display:flex; flex-direction:column; overflow:hidden; page-break-after:always; break-after:page; }
          .label:last-child { page-break-after:auto; break-after:auto; }
          .field { display:flex; align-items:baseline; font-size:11.5pt; line-height:1.55; white-space:nowrap; overflow:hidden; }
          .field .field-label { font-weight:800; flex:0 0 20mm; }
          .field .field-value { font-weight:500; flex:1; overflow:hidden; text-overflow:ellipsis; }
          .barcode-wrap { flex:1; display:flex; align-items:center; justify-content:center; margin-top:1mm; overflow:hidden; }
          .barcode-wrap svg { width:${LABEL_WIDTH_MM - 6}mm; height:15mm; }
        </style></head><body>${bodyHtml}</body></html>`;
      }

      function buildLabelHtml(job, product) {
        const quantity = Math.max(1, Math.floor(Number(job.quantity)) || 1);
        const bodyHtml = Array.from({ length: quantity }, () => buildLabelBodyHtml(job, product)).join('');
        return buildLabelDocument(bodyHtml);
      }

      function buildBatchLabelHtml(items) {
        const bodyHtml = items.flatMap(({ job, product }) => {
          const quantity = Math.max(1, Math.floor(Number(job.quantity)) || 1);
          return Array.from({ length: quantity }, () => buildLabelBodyHtml(job, product));
        }).join('');
        return buildLabelDocument(bodyHtml);
      }

      async function printLabelWindow(job, product) {
        await fetch(`/api/jobs/${job.id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'printing' }) });
        const printWindow = window.open('', '_blank', 'width=960,height=680');
        printWindow.document.write(buildLabelHtml(job, product));
        printWindow.document.close();
        setTimeout(() => { printWindow.print(); }, 400);
        await fetch(`/api/jobs/${job.id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'printed' }) });
      }

      async function printJobModel(job, product) {
        if (!job) return;
        await printLabelWindow(job, product);
        await refreshJobs();
        await refreshLogs();
      }

      async function printJobsBatch(jobsToPrint) {
        if (!jobsToPrint.length) return;

        await Promise.all(jobsToPrint.map((job) =>
          fetch(`/api/jobs/${job.id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'printing' }) })
        ));

        const items = jobsToPrint.map((job) => ({
          job,
          product: state.products.find((item) => item.barcode === job.barcode) || { name: job.note, sku: job.sku, option: job.option }
        }));

        const printWindow = window.open('', '_blank', 'width=960,height=680');
        printWindow.document.write(buildBatchLabelHtml(items));
        printWindow.document.close();
        setTimeout(() => { printWindow.print(); }, 400);

        await Promise.all(jobsToPrint.map((job) =>
          fetch(`/api/jobs/${job.id}`, { method:'PATCH', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ action:'printed' }) })
        ));

        await refreshJobs();
        await refreshLogs();
      }

      async function deleteJob(jobId) {
        await fetch(`/api/jobs/${jobId}`, { method: 'DELETE' });
        state.selectedJobs.delete(jobId);
        await refreshJobs();
      }

      window.printJob = async function(jobId) {
        const job = state.jobs.find((item) => item.id === jobId);
        if (!job) return;
        const product = state.products.find((item) => item.barcode === job.barcode) || { name: job.note, sku: job.sku, option: job.option };
        await printLabelWindow(job, product);
        await refreshJobs();
        await refreshLogs();
      };

      searchButton.addEventListener('click', searchProducts);
      searchInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          searchProducts();
        }
      });

      productResults.addEventListener('click', async (event) => {
        const button = event.target.closest('button[data-index]');
        if (!button) return;
        const index = Number(button.getAttribute('data-index'));
        const product = state.products[index];
        if (!product) return;
        if (button.getAttribute('data-action') === 'print') {
          await printProductNow(product);
        } else {
          await addProductToQueue(product);
        }
      });

      selectAllButton.addEventListener('click', () => {
        if (state.selectedJobs.size === state.jobs.length) {
          state.selectedJobs.clear();
        } else {
          state.selectedJobs = new Set(state.jobs.map((job) => job.id));
        }
        renderJobs();
      });

      printSelectedButton.addEventListener('click', async () => {
        const selected = state.jobs.filter((job) => state.selectedJobs.has(job.id));
        if (!selected.length) {
          searchMessage.textContent = '선택된 항목이 없습니다.';
          return;
        }
        await printJobsBatch(selected);
      });

      printAllButton.addEventListener('click', async () => {
        if (!state.jobs.length) {
          searchMessage.textContent = '대기열에 항목이 없습니다.';
          return;
        }
        await printJobsBatch(state.jobs.slice());
      });

      deleteSelectedButton.addEventListener('click', async () => {
        const selected = state.jobs.filter((job) => state.selectedJobs.has(job.id));
        if (!selected.length) {
          searchMessage.textContent = '선택된 항목이 없습니다.';
          return;
        }
        if (!window.confirm(`선택한 ${selected.length}개 항목을 삭제할까요?`)) return;
        await Promise.all(selected.map((job) => fetch(`/api/jobs/${job.id}`, { method: 'DELETE' })));
        selected.forEach((job) => state.selectedJobs.delete(job.id));
        await refreshJobs();
      });

      deleteAllButton.addEventListener('click', async () => {
        if (!state.jobs.length) {
          searchMessage.textContent = '대기열에 항목이 없습니다.';
          return;
        }
        if (!window.confirm(`대기열 전체(${state.jobs.length}개)를 삭제할까요?`)) return;
        await Promise.all(state.jobs.map((job) => fetch(`/api/jobs/${job.id}`, { method: 'DELETE' })));
        state.selectedJobs.clear();
        await refreshJobs();
      });

      startScanButton.addEventListener('click', startScan);
      stopScanButton.addEventListener('click', stopScan);

      jobList.addEventListener('change', (event) => {
        const checkbox = event.target.closest('input[type="checkbox"][data-job-id]');
        if (!checkbox) return;
        const jobId = checkbox.getAttribute('data-job-id');
        if (checkbox.checked) {
          state.selectedJobs.add(jobId);
        } else {
          state.selectedJobs.delete(jobId);
        }
        renderJobs();
      });

      jobList.addEventListener('click', (event) => {
        const button = event.target.closest('button.qty-btn[data-job-id]');
        if (!button) return;
        const jobId = button.getAttribute('data-job-id');
        const job = state.jobs.find((item) => item.id === jobId);
        if (!job) return;
        const action = button.getAttribute('data-action');
        const nextQuantity = action === 'inc' ? job.quantity + 1 : job.quantity - 1;
        updateJobQuantity(jobId, nextQuantity);
      });

      jobList.addEventListener('change', (event) => {
        const input = event.target.closest('input.qty-input[data-job-id]');
        if (!input) return;
        const jobId = input.getAttribute('data-job-id');
        updateJobQuantity(jobId, input.value);
      });

      toggleLogsButton.addEventListener('click', () => {
        state.logsCollapsed = !state.logsCollapsed;
        toggleLogsButton.textContent = state.logsCollapsed ? '펼치기' : '접기';
        logList.style.display = state.logsCollapsed ? 'none' : '';
      });

      clearLogsButton.addEventListener('click', async () => {
        if (!state.logs.length) return;
        if (!window.confirm('출력 로그를 모두 삭제할까요? 이 작업은 되돌릴 수 없습니다.')) return;
        await fetch('/api/logs', { method: 'DELETE' });
        state.logs = [];
        renderLogs();
      });

      const savedViewMode = localStorage.getItem('viewMode');
      const initialViewMode = savedViewMode || (window.matchMedia('(max-width:800px)').matches ? 'mobile' : 'pc');
      applyViewMode(initialViewMode);

      refreshJobs();
      refreshLogs();
      renderProducts();
      setInterval(() => {
        refreshJobs();
        refreshLogs();
      }, 3000);
    </script>
  </body>
</html>
